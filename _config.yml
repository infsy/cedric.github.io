#-------------------------------
# General Site Settings
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://cedricthibault.cloud" # the base hostname & protocol for your site, e.g. http://example.com

#-------------------------------
# Language Settings (Polyglot)
languages: ["fr", "en"]
default_lang: "fr"
exclude_from_localization: ["javascript/", "images/", "css/", "assets/", "_sass/", "js/", "CNAME", "LICENSE", "README.md", "Gemfile", "Gemfile.lock"]

#-------------------------------
# Build Settings
markdown: kramdown
permalink: /:title
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-polyglot

paginate: 6
paginate_path: "/page/:num"


#-------------------------------
# Collections
collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /:slug
  authors:
    output: false
    permalink: /:name

# Pages Path
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "authors"
    values:
      layout: "author"

sass:
  sass_dir: _sass
  style: compressed
